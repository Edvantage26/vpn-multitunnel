name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          SEMVER="${VERSION#v}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        shell: bash
        run: choco install nsis -y

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Build app with Wails
        shell: bash
        run: wails build

      - name: Build service
        shell: bash
        run: go build -o build/bin/VPNMultiTunnel-service.exe ./cmd/service

      - name: Build NSIS installer
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\NSIS
          cd build\windows\installer
          makensis /DARG_WAILS_AMD64_BINARY=..\..\bin\VPNMultiTunnel.exe project.nsi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VPN MultiTunnel ${{ steps.version.outputs.semver }}
          generate_release_notes: true
          files: build/bin/VPNMultiTunnel-amd64-installer.exe
